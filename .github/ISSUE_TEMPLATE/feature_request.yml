name: Feature request
description: Suggest a tool, workflow, or improvement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today that you wish you could?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like to see
      description: Concrete proposal. Tool name, parameters, expected output if relevant.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Workarounds you've tried, or other tools that solve part of this.
